<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
        <title>cebollin_3d_test</title>
        <style>
            html, body, #canvas { margin: 0; padding: 0; border: 0; }
            body { color: white; background-color: black; overflow: hidden; touch-action: none; font-family: sans-serif; }
            #canvas { display: block; }
            #canvas:focus { outline: none; }

            #status {
                position: absolute; left: 0; right: 0; top: 0; bottom: 0;
                background-color: #242424;
                display: flex; flex-direction: column; justify-content: center; align-items: center;
            }
            
            #status-progress { 
                width: 50%; height: 20px; margin-top: 20px;
                appearance: none; border-radius: 10px; overflow: hidden;
            }
            #status-progress::-webkit-progress-bar { background-color: #444; }
            #status-progress::-webkit-progress-value { background-color: #4CAF50; transition: width 0.3s ease; }
            
            #status-notice { color: white; margin-top: 15px; font-weight: bold; font-size: 1.2rem; }
        </style>
    </head>
    <body>
        <canvas id="canvas">Your browser does not support the canvas tag.</canvas>

        <div id="status">
            <img id="status-splash" src="index.png" alt="">
            <progress id="status-progress" value="0" max="100"></progress>
            <div id="status-notice">0%</div>
        </div>

        <script src="index.js"></script>
        <script>
            const GODOT_CONFIG = {
                "args":[],
                "canvasResizePolicy":1,
                "emscriptenPoolSize":8,
                "executable":"index",
                "experimentalVK":true,
                "fileSizes":{"index.pck":331429716,"index.wasm":1508095},
                "focusCanvas":true,
                "gdextensionLibs":["libterrain.web.release.wasm32.wasm"],
                "godotPoolSize":4,
                "mainPack": "https://assets.cebollingame.com/file/cebollinassets/index.pck"
            };
            
            const engine = new Engine(GODOT_CONFIG);
            const statusProgress = document.getElementById('status-progress');
            const statusNotice = document.getElementById('status-notice');
            const TOTAL_BYTES = 350 * 1024 * 1024; // Referencia fija de 350 MB

            engine.startGame({
                'onProgress': function (current, total) {
                    if (current > 0) {
                        statusProgress.value = current;
                        statusProgress.max = TOTAL_BYTES;
                        const percent = Math.round((current / TOTAL_BYTES) * 100);
                        statusNotice.innerText = percent + "%";
                    }
                },
            }).then(() => {
                statusProgress.value = TOTAL_BYTES;
                statusNotice.innerText = "100%";
                document.getElementById('status').style.display = 'none';
            });
        </script>
    </body>
</html>
